<title>ArkTS &amp; Cangjie Lint 调研</title>
<style>
  :root {
    --bg: #f8f5ee;
    --ink: #1a1a1a;
    --muted: #645e55;
    --red: #c5162e;
    --red-dark: #841324;
    --line: #ddd0bc;
    --font-display: 'Noto Serif SC', 'SimSun', serif;
    --font-body: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--ink);
    line-height: 1.7;
    min-height: 100vh;
  }
  .top-bar {
    background: linear-gradient(90deg, var(--red), var(--red-dark));
    height: 4px;
  }
  .container { max-width: 800px; margin: 0 auto; padding: 56px 24px 64px; }

  header {
    margin-bottom: 48px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--line);
  }
  header h1 {
    font-family: var(--font-display);
    font-size: 1.8rem;
    font-weight: 900;
    letter-spacing: 0.02em;
    margin-bottom: 6px;
  }
  header p {
    color: var(--muted);
    font-size: 0.92rem;
  }

  .section-label {
    font-family: var(--font-display);
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--red-dark);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 36px 0 14px;
  }
  .section-label:first-of-type { margin-top: 0; }

  .card {
    display: block;
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 22px 28px;
    margin-bottom: 14px;
    text-decoration: none;
    color: inherit;
    transition: box-shadow 0.2s, transform 0.15s;
  }
  .card:hover {
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    transform: translateY(-1px);
  }
  .card h3 {
    font-family: var(--font-display);
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--ink);
  }
  .card:hover h3 { color: var(--red); }
  .card .desc {
    font-size: 0.88rem;
    color: var(--muted);
  }
  .card .badge {
    display: inline-block;
    padding: 1px 8px;
    border-radius: 4px;
    font-size: 0.72rem;
    margin-top: 8px;
    background: #fef0f0;
    color: var(--red-dark);
  }
  .placeholder {
    opacity: 0.45;
    pointer-events: none;
    user-select: none;
  }

  footer {
    margin-top: 56px;
    padding-top: 24px;
    border-top: 1px solid var(--line);
    font-size: 0.8rem;
    color: var(--muted);
    text-align: center;
  }
  footer a { color: var(--red-dark); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  @media (max-width: 640px) {
    .container { padding: 32px 16px 48px; }
    header h1 { font-size: 1.35rem; }
    .card { padding: 18px 20px; }
  }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="container">

  <p>鸿蒙 ArkTS 与仓颉检查能力对比 · 调研报告与演示</p>
</header>
